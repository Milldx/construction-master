<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Фон — скруглённый квадрат в цвет бренда -->
  <rect width="48" height="48" rx="10" fill="#16223A"/>

  <!-- Молоток: повёрнут на -35°, чтобы выглядел «в ударе», а не плоско -->
  <g transform="rotate(-35 24 24)" fill="#F4A235">
    <!-- Боёк (голова молотка) -->
    <rect x="13" y="7" width="22" height="11" rx="3"/>
    <!-- Ручка -->
    <rect x="20.5" y="17" width="7" height="25" rx="3.5"/>
  </g>
</svg>
